# 部署到 VPS 时放在 /etc/nginx/sites-available/research.learnpath.tech，
# 再 ln -s 到 sites-enabled。跟同一台机器上 learnpath.tech 本体的配置同一套模式：
# 静态前端 dist 目录 + /api/ 反代到本地 FastAPI，且已验证过 SSE 流式需要的
# proxy_buffering off / proxy_read_timeout 300s 这两个设置。

server {
    listen 80;
    server_name research.learnpath.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name research.learnpath.tech;

    root /home/lvchenghao/deep-research-agent/frontend/dist;
    index index.html;

    # index.html 不缓存，确保每次部署后浏览器能拿到新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streaming support：关掉 nginx 自己的缓冲，否则浏览器要等
        # 后端整个响应结束才会一次性收到，看不到逐节点的进度
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # certbot --nginx 签发后会自动补全/校验这四行，先占位方便对照
    ssl_certificate /etc/letsencrypt/live/research.learnpath.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/research.learnpath.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
