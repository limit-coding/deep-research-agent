# 这是 certbot --nginx -d research.learnpath.tech 跑完之后服务器上的真实配置
# （从 /etc/nginx/sites-available/research.learnpath.tech 原样同步回来）。
# 部署一台新机器时手写的是不带 SSL 的版本（只有 listen 80），跑完 certbot 之后
# 它会自动改写成下面这样——证书路径、http->https 跳转都是 certbot 自己加的，
# 不需要手动维护这部分。

server {
    server_name research.learnpath.tech;

    root /home/lvchenghao/deep-research-agent/frontend/dist;
    index index.html;

    # index.html 不缓存，确保每次部署后浏览器能拿到新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streaming support：关掉 nginx 自己的缓冲，否则浏览器要等
        # 后端整个响应结束才会一次性收到，看不到逐节点的进度
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/research.learnpath.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/research.learnpath.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = research.learnpath.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name research.learnpath.tech;
    return 404; # managed by Certbot
}
